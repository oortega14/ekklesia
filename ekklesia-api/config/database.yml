default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", "5433") %>

development:
  <<: *default
  database: ekklesia_api_development

test:
  <<: *default
  database: ekklesia_api_test

production:
  primary: &primary_production
    <<: *default
    database: ekklesia_api_production
    username: ekklesia_api
    password: <%= ENV["EKKLESIA_API_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: ekklesia_api_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: ekklesia_api_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: ekklesia_api_production_cable
    migrations_paths: db/cable_migrate
